<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="head :: head"></head>

<body class="bg-gray-100 min-h-screen">
<div th:replace="menu :: menu"></div>
<div class="max-w-6xl mx-auto px-4 py-10 space-y-6">

    <!-- ===== HEADER ===== -->
    <div class="bg-white rounded-xl shadow p-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-extrabold">Chi tiết đơn hàng</h1>
            <p class="text-gray-500 mt-1">
                Mã đơn:
                <span class="font-bold text-blue-600"
                      th:text="${order.orderCode}"></span>
            </p>
        </div>

        <a th:href="@{/my-orders}"
           class="px-4 py-2 border rounded-lg font-semibold hover:bg-gray-50">
            ← Quay lại
        </a>
    </div>

    <!-- ===== ORDER INFO ===== -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Thông tin đơn -->
        <div class="bg-white rounded-xl shadow p-6 space-y-3">
            <h2 class="font-bold text-lg"> Thông tin đơn hàng</h2>

            <p>Ngày đặt:
                <span class="font-semibold"
                      th:text="${order.orderDate}"></span>
            </p>

            <p>Trạng thái:
                <span class="font-bold"
                      th:switch="${order.status}">
                    <span th:case="'PENDING'" class="text-yellow-600">Chờ xử lý</span>
                    <span th:case="'CONFIRMED'" class="text-blue-600">Đã xác nhận</span>
                    <span th:case="'SHIPPING'" class="text-purple-600">Đang giao</span>
                    <span th:case="'DELIVERED'" class="text-green-600">Hoàn tất</span>
                    <span th:case="'CANCELLED'" class="text-red-600">Đã hủy</span>
                </span>
            </p>

            <p>Thanh toán:
                <span class="font-semibold"
                      th:text="${order.paymentMethod}"></span>
                -
                <span th:text="${order.paymentStatus}"></span>
            </p>
        </div>

        <!-- Thông tin giao hàng -->
        <div class="bg-white rounded-xl shadow p-6 space-y-3">
            <h2 class="font-bold text-lg"> Thông tin giao hàng</h2>

            <p>Người nhận:
                <span class="font-semibold"
                      th:text="${order.customerName}"></span>
            </p>

            <p>SĐT:
                <span th:text="${order.customerPhone}"></span>
            </p>

            <p>Địa chỉ:
                <span th:text="${order.customerAddress}"></span>
            </p>
        </div>

    </div>

    <!-- ===== ORDER ITEMS ===== -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
        <div class="px-6 py-4 border-b flex justify-between items-center">
            <h2 class="font-bold text-lg"> Sản phẩm đã mua</h2>
            <span class="text-sm text-gray-500 font-semibold"
                  th:text="${#lists.size(order.orderDetails)} + ' sản phẩm'"></span>
        </div>

        <table class="w-full">
            <thead class="bg-gray-50 text-sm">
                <tr>
                    <th class="px-6 py-3 text-left">Sản phẩm</th>
                    <th class="px-6 py-3 text-center">Số lượng</th>
                    <th class="px-6 py-3 text-right">Giá</th>
                    <th class="px-6 py-3 text-right">Tạm tính</th>
                </tr>
            </thead>

            <tbody class="divide-y">
                <tr th:each="item : ${order.orderDetails}">
                    <td class="px-6 py-4 font-semibold"
                        th:text="${item.book.title}"></td>

                    <td class="px-6 py-4 text-center"
                        th:text="${item.quantity}"></td>

                    <td class="px-6 py-4 text-right"
                        th:text="${item.price} + 'đ'"></td>

                    <td class="px-6 py-4 text-right font-bold"
                        th:text="${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')} + ' ₫'"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- ===== TOTAL ===== -->
    <div class="bg-white rounded-xl shadow p-6 flex justify-end">
        <div class="text-right space-y-2">
            <p class="text-gray-500">Tổng thanh toán</p>
            <p class="text-2xl font-extrabold text-blue-600"
               th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' ₫'"></p>
        </div>
    </div>

</div>

</body>
</html>
