<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="head :: head"></head>

<body class="bg-[#f5f5f5] font-display text-gray-800">

	<!-- ================= MENU (FRAGMENT) ================= -->
	<div th:replace="menu :: menu"></div>

	<!-- ================= MAIN ================= -->
	<main class="max-w-[1400px] mx-auto px-6 mt-6 space-y-12">

		<!-- ================= BANNER SLIDER ================= -->
		<section class="relative rounded-2xl overflow-hidden shadow-lg">

			<div class="relative h-[600px]">

				<div th:each="banner, stat : ${banners}"
					class="banner-slide absolute inset-0 opacity-0 transition-opacity duration-1000"
					th:classappend="${stat.index == 0} ? 'opacity-100 z-10' : 'z-0'">

					<img th:src="@{${banner.image_url}}"
						class="w-full h-full object-cover">

					<!-- overlay -->
					<div
						class="absolute inset-0 bg-gradient-to-r from-black/30 to-transparent"></div>
				</div>

			</div>

			<!-- DOTS -->
			<div
				class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2 z-20">
				<button th:each="b, stat : ${banners}"
					class="banner-dot w-3 h-3 rounded-full bg-white/50 hover:bg-white transition"
					th:attr="data-index=${stat.index}"></button>
			</div>

		</section>

		<!-- ================= NEW BOOKS ================= -->
		<section>
			<div class="flex justify-between items-center mb-6">
				<h2 class="text-2xl font-extrabold">Sách hay mỗi ngày</h2>
				<a href="#" class="text-primary font-semibold">Xem tất cả →</a>
			</div>
			<div th:if="${newBooks == null or #lists.isEmpty(newBooks)}"
				class="text-center py-10 text-gray-600 font-medium">Hiện chưa
				có sách mới nào...</div>

			<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"
				th:unless="${newBooks == null or #lists.isEmpty(newBooks)}">
				<div th:each="b : ${newBooks}"
					class="bg-white rounded-xl shadow hover:shadow-xl transition p-4 group relative">

					<!-- Ảnh sách -->
					<a th:href="@{/book/{id}(id=${b.id})}"
						class="block relative h-[220px] rounded-lg overflow-hidden mb-3 bg-gray-100">

						<img
						th:src="${#strings.isEmpty(b?.imageUrl)}
          ? @{/images/book-default.jpg}
          : @{/uploads/{img}(img=${b.imageUrl})}"
						class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
					</a> <a th:href="@{/book/{id}(id=${b.id})}">
						<p
							class="font-bold text-sm line-clamp-2 hover:text-primary transition"
							th:text="${b?.title} ?: 'Chưa có tên sách'"></p>
					</a>				

					<!-- Tác giả -->
					<p class="text-xs text-gray-500 mt-1"
						th:text="${b?.author?.name} ?: 'Chưa cập nhật'">Tác giả</p>

					<!-- Giá -->
					<div class="mt-3 flex justify-between items-center">
						<span class="text-primary font-extrabold text-lg"
							th:text="${b.price != null} 
               ? ${#numbers.formatDecimal(b.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'
               : 'Liên hệ'">
						</span>

						<button th:attr="data-book-id=${b?.id}" onclick="addToCart(this)"
							class="text-sm bg-primary text-white px-3 py-1 rounded-full hover:opacity-90">
							🛒</button>
					</div>
				</div>
			</div>
		</section>

	</main>

	<!-- ================= SCRIPT ================= -->
	<script>
function addToCart(btn){
  const id = btn.dataset.bookId;

  fetch('/cart/api/add',{
    method:'POST',
    headers:{
      'Content-Type':'application/x-www-form-urlencoded'
    },
    body:new URLSearchParams({
      bookId:id,
      quantity:1
    })
  })
  .then(response => response.json())
  .then(data => {
    console.log("Response:", data);

    if(data.success){
      alert("✔ " + data.message);
    }else{
      alert("❌ " + data.message);
    }
  })
  .catch(error => {
    console.error("Error:", error);
    alert("Lỗi kết nối server!");
  });
}
</script>

	<script>
document.addEventListener("DOMContentLoaded", () => {
  const slides = document.querySelectorAll(".banner-slide");
  const dots = document.querySelectorAll(".banner-dot");
  if (slides.length <= 1) return;

  let current = 0;

  function show(i){
    slides.forEach((s,idx)=>{
      s.classList.toggle("opacity-100", idx===i);
      s.classList.toggle("z-10", idx===i);
      s.classList.toggle("opacity-0", idx!==i);
    });
    dots.forEach((d,idx)=>{
      d.classList.toggle("bg-white", idx===i);
      d.classList.toggle("bg-white/50", idx!==i);
    });
    current = i;
  }

  setInterval(()=>show((current+1)%slides.length), 4000);
  dots.forEach(d=>d.onclick=()=>show(+d.dataset.index));
});
</script>

	<!-- ================= FOOTER ================= -->
	<div th:replace="footer :: footer"></div>

</body>
</html>
