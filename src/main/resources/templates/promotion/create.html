<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="admin/layout :: admin_layout(~{::content})">

<th:block th:fragment="content">

	<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap');

* { box-sizing: border-box; }

.promo-wrapper {
	display: flex;
	gap: 24px;
	margin-top: 32px;
	padding: 0 16px 32px;
	font-family: 'Be Vietnam Pro', sans-serif;
	align-items: flex-start;
}

/* ===== LEFT PANEL ===== */
.promo-left {
	flex: 0 0 420px;
}

.promo-card {
	background: #ffffff;
	width: 100%;
	padding: 32px 28px;
	border-radius: 16px;
	box-shadow: 0 4px 24px rgba(0,0,0,0.08);
	border: 1px solid #f0f0f0;
}

.promo-card h3 {
	text-align: center;
	margin: 0 0 28px;
	font-size: 19px;
	font-weight: 700;
	color: #111827;
	letter-spacing: -0.3px;
}

.form-group {
	margin-bottom: 16px;
}

label {
	font-size: 13px;
	font-weight: 600;
	margin-bottom: 6px;
	display: block;
	color: #374151;
}

input[type="text"],
input[type="number"],
input[type="date"],
select {
	width: 100%;
	padding: 10px 13px;
	border-radius: 9px;
	border: 1.5px solid #e5e7eb;
	font-size: 14px;
	font-family: inherit;
	color: #111827;
	background: #fafafa;
	transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus, select:focus {
	outline: none;
	border-color: #6366f1;
	box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
	background: #fff;
}

.date-row {
	display: flex;
	gap: 12px;
}

.date-row .form-group { flex: 1; }

button[type="submit"] {
	width: 100%;
	margin-top: 20px;
	padding: 13px;
	background: linear-gradient(135deg, #6366f1 0%, #22c55e 100%);
	border: none;
	border-radius: 10px;
	color: #fff;
	font-size: 15px;
	font-weight: 700;
	cursor: pointer;
	font-family: inherit;
	letter-spacing: 0.2px;
	transition: opacity 0.2s, transform 0.1s;
}

button[type="submit"]:hover { opacity: 0.92; }
button[type="submit"]:active { transform: scale(0.99); }

.note {
	text-align: center;
	font-size: 12px;
	color: #9ca3af;
	margin-top: 12px;
	line-height: 1.5;
}

/* ===== RIGHT PANEL ===== */
.promo-right {
	flex: 1;
	min-width: 0;
}

.selection-panel {
	background: #ffffff;
	border-radius: 16px;
	box-shadow: 0 4px 24px rgba(0,0,0,0.08);
	border: 1px solid #f0f0f0;
	padding: 28px;
}

.selection-panel h4 {
	font-size: 16px;
	font-weight: 700;
	color: #111827;
	margin: 0 0 16px;
	display: flex;
	align-items: center;
	gap: 8px;
}

.selection-panel h4 .badge {
	background: #6366f1;
	color: #fff;
	font-size: 11px;
	padding: 2px 9px;
	border-radius: 20px;
	font-weight: 600;
}

.empty-state {
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	min-height: 260px;
	color: #9ca3af;
	gap: 14px;
}

.empty-state p {
	font-size: 14px;
	text-align: center;
	line-height: 1.6;
}

.search-box {
	width: 100%;
	padding: 9px 13px;
	border-radius: 9px;
	border: 1.5px solid #e5e7eb;
	font-size: 14px;
	font-family: 'Be Vietnam Pro', sans-serif;
	margin-bottom: 12px;
	background: #fafafa;
	transition: border-color 0.2s;
}

.search-box:focus {
	outline: none;
	border-color: #6366f1;
	background: #fff;
}

.select-bar {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 12px;
}

.select-bar .count {
	font-size: 13px;
	color: #6b7280;
	font-weight: 500;
}

.select-all-btn {
	font-size: 13px;
	color: #6366f1;
	font-weight: 600;
	cursor: pointer;
	background: none;
	border: none;
	padding: 0;
	font-family: inherit;
}

.item-grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
	gap: 9px;
	max-height: 380px;
	overflow-y: auto;
	padding-right: 4px;
}

.item-grid::-webkit-scrollbar { width: 5px; }
.item-grid::-webkit-scrollbar-track { background: #f3f4f6; border-radius: 4px; }
.item-grid::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

.item-card {
	display: flex;
	align-items: center;
	gap: 10px;
	padding: 10px 13px;
	border-radius: 10px;
	border: 1.5px solid #e5e7eb;
	cursor: pointer;
	transition: border-color 0.15s, background 0.15s;
	user-select: none;
}

.item-card:hover {
	border-color: #a5b4fc;
	background: #f5f3ff;
}

.item-card.selected {
	border-color: #6366f1;
	background: #eef2ff;
}

.item-card input[type="checkbox"] {
	accent-color: #6366f1;
	width: 15px;
	height: 15px;
	flex-shrink: 0;
	cursor: pointer;
	pointer-events: none;
}

.item-card .item-label {
	font-size: 13.5px;
	font-weight: 500;
	color: #1f2937;
	line-height: 1.4;
}
</style>

	<div class="promo-wrapper">

		<!-- LEFT: Form -->
		<div class="promo-left">
			<div class="promo-card">
				<h3>Tạo chương trình khuyến mãi</h3>

				<form th:action="@{/admin/promotions/save}" th:object="${promotion}" method="post">

					<div class="form-group">

						<label>Tên khuyến mãi</label>
						<input type="text" th:field="*{name}" placeholder="VD: Sale hè 2026">
					</div>

					<div class="form-group">
						<label>Giá trị giảm</label>
						<input type="number" th:field="*{discountValue}" placeholder="VD: 10 (%)">
					</div>

					<div class="date-row">
						<div class="form-group">
							<label>Ngày bắt đầu</label>
							<input type="date" th:field="*{startDate}">
						</div>
						<div class="form-group">
							<label>Ngày kết thúc</label>
							<input type="date" th:field="*{endDate}">
						</div>
					</div>

					<div class="form-group">
						<label>Áp dụng cho</label>
						<select id="applyType">
							<option value="ALL">Toàn sàn</option>
							<option value="BOOK">Theo sách</option>
							<option value="CATEGORY">Theo thể loại</option>
						</select>
					</div>

					<!-- Hidden inputs synced from right panel -->
					<div id="hiddenBookInputs"></div>
					<div id="hiddenCategoryInputs"></div>

					<button type="submit">Tạo khuyến mãi</button>
					<p class="note">Nếu không chọn sách hoặc thể loại → hệ thống hiểu là áp dụng toàn bộ</p>
				</form>
			</div>
		</div>

		<!-- RIGHT: Selection panel -->
		<div class="promo-right">
			<div class="selection-panel">

				<!-- Empty state -->
				<div id="emptyState" class="empty-state">
					<svg width="68" height="68" viewBox="0 0 68 68" fill="none">
						<rect x="10" y="14" width="48" height="40" rx="7" stroke="#d1d5db" stroke-width="2.5" fill="#f9fafb"/>
						<path d="M22 30h24M22 39h14" stroke="#d1d5db" stroke-width="2.5" stroke-linecap="round"/>
					</svg>
					<p>Chọn <strong style="color:#6366f1">Theo sách</strong> hoặc <strong style="color:#6366f1">Theo thể loại</strong><br>để hiển thị danh sách tại đây</p>
				</div>

				<!-- Book list -->
				<div id="bookPanel" style="display:none;">
					<h4>Danh sách sách <span class="badge" id="bookBadge">0</span></h4>
					<input class="search-box" type="text" id="bookSearch" placeholder="🔍 Tìm kiếm sách...">
					<div class="select-bar">
						<span class="count" id="bookCount">0 sách đã chọn</span>
						<button type="button" class="select-all-btn" id="bookSelectAll">Chọn tất cả</button>
					</div>
					<div class="item-grid" id="bookGrid">
						<div th:each="b : ${books}"
							class="item-card"
							th:data-id="${b.id}"
							th:data-name="${b.title}">
							<input type="checkbox" th:value="${b.id}">
							<span class="item-label" th:text="${b.title}"></span>
						</div>
					</div>
				</div>

				<!-- Category list -->
				<div id="categoryPanel" style="display:none;">
					<h4>Danh sách thể loại <span class="badge" id="catBadge">0</span></h4>
					<input class="search-box fi fi-ds-search" type="text" id="catSearch" placeholder=" Tìm kiếm thể loại...">
					<div class="select-bar">
						<span class="count" id="catCount">0 thể loại đã chọn</span>
						<button type="button" class="select-all-btn" id="catSelectAll">Chọn tất cả</button>
					</div>
					<div class="item-grid" id="catGrid">
						<div th:each="c : ${categories}"
							class="item-card"
							th:data-id="${c.id}"
							th:data-name="${c.name}">
							<input type="checkbox" th:value="${c.id}">
							<span class="item-label" th:text="${c.name}"></span>
						</div>
					</div>
				</div>

			</div>
		</div>
	</div>

	<script>
		const applyType     = document.getElementById("applyType");
		const emptyState    = document.getElementById("emptyState");
		const bookPanel     = document.getElementById("bookPanel");
		const categoryPanel = document.getElementById("categoryPanel");

		applyType.addEventListener("change", function () {
			const v = this.value;
			emptyState.style.display    = v === "ALL"      ? "flex"  : "none";
			bookPanel.style.display     = v === "BOOK"     ? "block" : "none";
			categoryPanel.style.display = v === "CATEGORY" ? "block" : "none";
		});

		function initPanel({ gridId, searchId, countId, badgeId, selectAllId, hiddenId, inputName }) {
			const grid     = document.getElementById(gridId);
			const searchEl = document.getElementById(searchId);
			const countEl  = document.getElementById(countId);
			const badgeEl  = document.getElementById(badgeId);
			const saBtn    = document.getElementById(selectAllId);
			const hidden   = document.getElementById(hiddenId);

			const cards = () => [...grid.querySelectorAll(".item-card")];

			function syncHidden() {
				hidden.innerHTML = "";
				cards().filter(c => c.classList.contains("selected")).forEach(c => {
					const inp = document.createElement("input");
					inp.type  = "hidden";
					inp.name  = inputName;
					inp.value = c.dataset.id;
					hidden.appendChild(inp);
				});
			}

			function updateCount() {
				const n = cards().filter(c => c.classList.contains("selected")).length;
				countEl.textContent = n + " đã chọn";
				badgeEl.textContent = n;
				syncHidden();
			}

			grid.addEventListener("click", function (e) {
				const card = e.target.closest(".item-card");
				if (!card) return;
				card.classList.toggle("selected");
				card.querySelector("input[type=checkbox]").checked = card.classList.contains("selected");
				updateCount();
			});

			searchEl.addEventListener("input", function () {
				const q = this.value.toLowerCase();
				cards().forEach(c => {
					c.style.display = c.dataset.name.toLowerCase().includes(q) ? "" : "none";
				});
			});

			let allSel = false;
			saBtn.addEventListener("click", function () {
				allSel = !allSel;
				cards().filter(c => c.style.display !== "none").forEach(c => {
					c.classList.toggle("selected", allSel);
					c.querySelector("input[type=checkbox]").checked = allSel;
				});
				this.textContent = allSel ? "Bỏ chọn tất cả" : "Chọn tất cả";
				updateCount();
			});
		}

		initPanel({ gridId:"bookGrid", searchId:"bookSearch", countId:"bookCount", badgeId:"bookBadge", selectAllId:"bookSelectAll", hiddenId:"hiddenBookInputs",     inputName:"bookIds" });
		initPanel({ gridId:"catGrid",  searchId:"catSearch",  countId:"catCount",  badgeId:"catBadge",  selectAllId:"catSelectAll",  hiddenId:"hiddenCategoryInputs", inputName:"categoryIds" });
	</script>

</th:block>
</html>
