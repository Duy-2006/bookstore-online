<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{head :: head}"></head>

<body>

<div th:replace="~{menu :: menu}"></div>

<div class="login-wrapper">

    <div class="login-card">

        <div class="login-header">
            <h2>Chào mừng trở lại </h2>
            <p>Đăng nhập để tiếp tục mua sắm</p>
        </div>

        <form th:object="${bean}" th:action="@{/login}" method="post">

            <!-- USERNAME -->
            <div class="input-group">
                <label>Tên tài khoản hoặc Email</label>
                <div class="input-box">
                    
                    <input type="text"
                           th:field="*{usernameOrEmail}"
                           placeholder="Nhập tên tài khoảng hoặc email">
                </div>
                <div th:errors="*{usernameOrEmail}" 
                     class="error-text"></div>
            </div>

            <!-- PASSWORD -->
            <div class="input-group">
                <label>Mật khẩu</label>
                <div class="input-box">
                    
                    <input type="password"
                           th:field="*{password}"
                           placeholder="Nhập mật khẩu">
                </div>
                <div th:errors="*{password}" 
                     class="error-text"></div>
            </div>

            <!-- BUTTON -->
            <button type="submit" class="login-btn">
                Đăng nhập
            </button>

            <!-- MESSAGE -->
            <div th:if="${message}"
                 class="alert-box"
                 th:text="${message}">
            </div>

        </form>

    </div>

</div>

<style>

/* ===== BACKGROUND ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0a4da3;
}

/* ===== WRAPPER ===== */
.login-wrapper {
    min-height: calc(100vh - 70px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
}

/* ===== CARD ===== */
.login-card {
    width: 100%;
    max-width: 450px;
    padding: 45px 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    color: white;
}

/* HEADER */
.login-header h2 {
    margin: 0;
    font-weight: 700;
}

.login-header p {
    margin-top: 6px;
    font-size: 14px;
    opacity: 0.8;
}

/* INPUT GROUP */
.input-group {
    margin-top: 25px;
}

.input-group label {
    font-weight: 600;
    font-size: 14px;
}

.input-box {
    display: flex;
    align-items: center;
    margin-top: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 12px 15px;
    transition: 0.3s;
}

.input-box:focus-within {
    background: rgba(255,255,255,0.3);
    box-shadow: 0 0 10px rgba(255,255,255,0.4);
}

.input-box input {
    border: none;
    outline: none;
    background: transparent;
    flex: 1;
    color: white;
    font-size: 16px;
}

.input-box input::placeholder {
    color: rgba(255,255,255,0.7);
}

.icon {
    margin-right: 10px;
    font-size: 18px;
}

/* BUTTON */
.login-btn {
    width: 100%;
    margin-top: 30px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    font-size: 16px;
    background: white;
    color: #667eea;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    background: #f1f1f1;
    transform: translateY(-2px);
}

/* ERROR */
.error-text {
    color: #ffdede;
    font-size: 13px;
    margin-top: 6px;
}

/* ALERT */
.alert-box {
    margin-top: 20px;
    background: rgba(255, 0, 0, 0.2);
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    font-size: 14px;
}

/* RESPONSIVE */
@media (max-width: 576px) {
    .login-card {
        padding: 35px 25px;
    }
}

</style>

</body>
</html>
