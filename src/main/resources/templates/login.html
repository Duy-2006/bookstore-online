<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{head :: head}"></head>

<body>

<div th:replace="~{menu :: menu}"></div>

<div class="login-wrapper">
    <div class="login-container">

        <h3 class="text-center mb-4">Đăng nhập</h3>

        <form th:object="${bean}" th:action="@{/login}" method="post">

            <div class="mb-4">
                <label class="form-label">Tên tài khoản hoặc Email</label>
                <input type="text"
                       th:field="*{usernameOrEmail}"
                       class="form-control"
                       placeholder="Nhập username hoặc email">
                <div th:errors="*{usernameOrEmail}" 
                     class="text-danger mt-2"></div>
            </div>

            <div class="mb-4">
                <label class="form-label">Mật khẩu</label>
                <input type="password"
                       th:field="*{password}"
                       class="form-control"
                       placeholder="Nhập mật khẩu">
                <div th:errors="*{password}" 
                     class="text-danger mt-2"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3">
                Đăng Nhập
            </button>

            <div th:if="${message}"
                 class="alert alert-danger mt-4 text-center"
                 th:text="${message}">
            </div>

        </form>

    </div>
</div>

<style>

/* BODY */
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* WRAPPER */
.login-wrapper {
    min-height: calc(100vh - 70px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
}

/* CONTAINER */
.login-container {
    background: white;
    width: 100%;
    max-width: 600px;   /* TO HƠN */
    padding: 50px 45px; /* RỘNG HƠN */
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

/* INPUT */
.form-control {
    width: 100%;
    height: 55px;       /* CAO HƠN */
    font-size: 18px;    /* CHỮ TO HƠN */
    border-radius: 12px;
    border: 1.5px solid #ddd;
    padding: 10px 15px;
}

.form-control:focus {
    border-color: #667eea;
    box-shadow: 0 0 8px rgba(102,126,234,0.4);
}

/* LABEL */
.form-label {
    font-weight: 600;
    font-size: 16px;
}

/* BUTTON */
.btn-primary {
    background: #667eea;
    border: none;
    font-size: 18px;
    font-weight: bold;
    border-radius: 12px;
}

.btn-primary:hover {
    background: #5563d6;
}

/* RESPONSIVE */
@media (max-width: 576px) {
    .login-container {
        padding: 35px 25px;
    }
}

</style>

</body>
</html>
