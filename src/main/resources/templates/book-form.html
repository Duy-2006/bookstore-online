<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Thêm / Sửa sách</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

	<div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow">

		<h2 class="text-xl font-bold mb-6">Thông tin sách</h2>

		<form th:action="@{/books/save}" th:object="${book}" method="post">

			<input type="hidden" th:field="*{id}" /> <label>Tên sách</label> <input
				type="text" th:field="*{title}" class="w-full border p-2 mb-4">

			<label>Giá</label> <input type="number" th:field="*{price}"
				class="w-full border p-2 mb-4"> <label>Tác giả</label> <input
				type="text" th:field="*{author}" class="w-full border p-2 mb-4">

			<button class="bg-green-600 text-white px-4 py-2 rounded">
				Lưu</button>

		</form>

	</div>
</body>
</html>
