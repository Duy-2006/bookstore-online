<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="head :: head"></head>

<body class="bg-[#f5f5f5] font-display text-[#222]">

	<!-- MENU -->
	<div th:replace="menu :: menu"></div>

	<main class="max-w-[1200px] mx-auto px-4 pt-8 pb-36">

		<!-- TITLE -->
		<div class="mb-6">
			<h2 class="text-3xl font-extrabold">🛒 Giỏ hàng</h2>
			<p class="text-sm text-gray-500 mt-1"
				></p>
		</div>

		<!-- HEADER -->
		<div
			class="hidden md:grid grid-cols-[40px_1fr_160px_140px_80px]
                items-center gap-4 px-6 py-4 bg-gray-50
                text-sm font-bold text-gray-500 border-b">
			<span></span> <span>Sản phẩm</span> <span class="text-center">Giá</span>
			<span class="text-center">Số lượng</span> <span class="text-center">Xóa</span>
		</div>

		<!-- CART ITEMS -->
		<div th:each="item : ${cartItems}"
			class="cart-item grid grid-cols-[40px_1fr_160px_140px_80px]
                items-center gap-4 px-6 py-5 border-b"
			th:data-price="${item.price}" th:data-quantity="${item.quantity}">

			<!-- CHECKBOX -->
			<input type="checkbox" class="cart-checkbox"
				th:data-id="${item.cartDetailId}" th:checked="${item['selected']}">

			<!-- PRODUCT -->
			<div class="flex gap-4 items-center">
				<div class="w-24 h-32 rounded-xl bg-cover bg-center shadow-sm"
					th:style="'background-image:url(' + ${item.imageUrl} + ')'"></div>

				<div>
					<p class="font-bold text-lg" th:text="${item.title}"></p>
					<p class="text-xs text-gray-500 uppercase" th:text="${item.author}"></p>
				</div>
			</div>

			<!-- PRICE -->
			<div class="text-primary font-extrabold text-lg text-center"
				th:text="${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')} + 'đ'">
			</div>

			<!-- QUANTITY -->
			<div class="flex justify-center items-center gap-2 quantity-box">
				<button type="button" class="qty-btn minus"
					th:data-id="${item.cartDetailId}">−</button>

				<span class="font-bold quantity" th:text="${item.quantity}"></span>

				<button type="button" class="qty-btn plus"
					th:data-id="${item.cartDetailId}">+</button>
			</div>


			<!-- DELETE -->
			<button type="button"
				class="delete-btn text-red-500 hover:bg-red-50 rounded-full p-3"
				th:data-id="${item.cartDetailId}">🗑️</button>
		</div>

	</main>

	<!-- CHECKOUT BAR -->
	<div class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg">
		<div
			class="max-w-[1200px] mx-auto px-4 py-4
                flex items-center justify-between">

			<div>
				<p class="text-xs text-gray-500 font-bold">TỔNG THANH TOÁN</p>
				<p class="text-3xl font-extrabold text-primary" id="totalPrice">0đ</p>
				<p class="text-xs text-gray-500" id="selectedCount">(0 sản phẩm)</p>
			</div>

			<a href="/checkout" id="checkoutBtn"
				class="px-8 py-3 bg-primary text-white rounded-xl font-bold
                  opacity-50 pointer-events-none transition">
				Thanh toán → </a>
		</div>
	</div>

	<!-- JS -->
	<script>
document.addEventListener("DOMContentLoaded", () => {

    const checkboxes = document.querySelectorAll(".cart-checkbox");
    const totalEl = document.getElementById("totalPrice");
    const countEl = document.getElementById("selectedCount");
    const checkoutBtn = document.getElementById("checkoutBtn");

    function format(n) {
        return n.toLocaleString("vi-VN") + "đ";
    }

    function updateUI() {
        let total = 0;
        let count = 0;

        document.querySelectorAll(".cart-item").forEach(item => {
            const cb = item.querySelector(".cart-checkbox");
            if (cb.checked) {
                const price = Number(item.dataset.price);
                const qty = Number(item.dataset.quantity);
                total += price * qty;
                count++;
            }
        });

        totalEl.innerText = format(total);
        countEl.innerText = `(${count} sản phẩm)`;

        checkoutBtn.classList.toggle("opacity-50", count === 0);
        checkoutBtn.classList.toggle("pointer-events-none", count === 0);
    }

    // ================= CHECKBOX =================
    checkboxes.forEach(cb => {
        cb.addEventListener("change", () => {

            fetch("/cart/select", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    cartDetailId: cb.dataset.id,
                    selected: cb.checked
                })
            });

            updateUI();
        });
    });

    // ================= PLUS / MINUS =================
    document.querySelectorAll(".qty-btn").forEach(btn => {
        btn.addEventListener("click", () => {

            const id = btn.dataset.id;
            const qtyEl = btn.parentElement.querySelector(".quantity");
            const cartItem = btn.closest(".cart-item");

            let qty = Number(qtyEl.innerText);

            if (btn.classList.contains("plus")) {
                qty++;
            } else {
                qty--;
            }

            if (qty < 1) return;

            fetch("/cart/update", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    cartDetailId: id,
                    quantity: qty
                })
            })
            .then(() => {
                qtyEl.innerText = qty;
                cartItem.dataset.quantity = qty;
                updateUI();
            });
        });
    });

    updateUI();
});

//================= DELETE =================
document.querySelectorAll(".delete-btn").forEach(btn => {
    btn.addEventListener("click", () => {

        const id = btn.dataset.id;
        const cartItem = btn.closest(".cart-item");

        fetch("/cart/api/remove", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "cartDetailId=" + id
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                cartItem.remove();
                updateUI();
            } else {
                alert(data.message);
            }
        });
    });
});
</script>


	<!-- FOOTER -->
	<div th:replace="footer :: footer"></div>
	<style>
.qty-btn {
	width: 32px;
	height: 32px;
	border-radius: 8px;
	background: #f3f4f6;
	font-weight: bold;
	font-size: 18px;
	cursor: pointer;
	transition: .2s;
}

.qty-btn:hover {
	background: #e5e7eb;
}
</style>

</body>
</html>
