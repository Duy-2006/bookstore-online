<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{head :: head}"></head>

<body class="bg-[#f5f5f5] min-h-screen font-display text-[#222]">

<div th:replace="~{menu :: menu}"></div>

<form th:action="@{/checkout}" method="post" th:object="${checkoutBean}">

<!-- ================= HEADER ================= -->
<header class="sticky top-0 z-50 bg-white border-b">
  <div class="max-w-[1200px] mx-auto flex items-center px-4 py-4">
    <a th:href="@{/cart}" class="size-10 flex items-center justify-center">
      <span class="material-symbols-outlined text-primary">
        arrow_back_ios_new
      </span>
    </a>
    <h2 class="flex-1 text-center text-xl font-extrabold uppercase">
      Thanh toán
    </h2>
  </div>
</header>

<!-- ================= MAIN ================= -->
<main class="max-w-[1200px] mx-auto px-4 py-8 pb-40">

<div class="grid grid-cols-1 lg:grid-cols-[1.4fr_1fr] gap-6">

<!-- ================= CUSTOMER INFO ================= -->
<section class="bg-white rounded-2xl shadow-sm p-6">
<h3 class="text-xl font-extrabold mb-6">📦 Thông tin nhận hàng</h3>

<div class="space-y-4">
  <input th:field="*{customerName}" class="input" placeholder="Họ và tên">
  <p class="error" th:errors="*{customerName}"></p>

  <input th:field="*{customerPhone}" class="input" placeholder="Số điện thoại">
  <p class="error" th:errors="*{customerPhone}"></p>

  <input th:field="*{email}" class="input" placeholder="Email">
  <p class="error" th:errors="*{email}"></p>

  <textarea th:field="*{customerAddress}"
            class="input min-h-[100px]"
            placeholder="Địa chỉ giao hàng"></textarea>
  <p class="error" th:errors="*{customerAddress}"></p>
</div>
</section>

<!-- ================= ORDER SUMMARY ================= -->
<section class="bg-white rounded-2xl shadow-sm p-6">
<div class="flex justify-between items-center mb-6">
  <h3 class="text-xl font-extrabold">🧾 Đơn hàng</h3>
  <span class="text-sm text-gray-500 font-bold"
        th:text="${#lists.size(cartDetails)} + ' sản phẩm'"></span>
</div>

<div th:each="item : ${cartDetails}" class="flex gap-4 py-4">

  <img th:src="@{/uploads/{img}(img=${item.imageUrl})}"
     class="w-20 h-28 rounded-xl object-cover"/>

  <div class="flex-1">
    <p class="font-bold leading-tight"
       th:text="${item.title}"></p>

    <p class="text-sm text-gray-500 mt-1">
      SL: <span th:text="${item.quantity}"></span>
    </p>

    <span class="font-bold text-primary"
      th:text="${#numbers.formatDecimal(item.itemTotal, 0, 'COMMA', 0, 'POINT')} + ' đ'">
</span>
  </div>

</div>

    
  </div>
</div>
</div>
</section>

</div>

<!-- ================= PAYMENT + TOTAL ================= -->
<div class="grid grid-cols-1 lg:grid-cols-[1fr_420px] gap-6 mt-6">

<section class="bg-white rounded-2xl shadow-sm p-6">
<h3 class="text-xl font-extrabold mb-4">💳 Phương thức thanh toán</h3>

<label class="payment-option">
  <input type="radio" th:field="*{paymentMethod}" value="COD">
  <span>Thanh toán khi giao hàng (COD)</span>
</label>

<label class="payment-option">
  <input type="radio" th:field="*{paymentMethod}" value="BANKING">
  <span>Chuyển khoản ngân hàng</span>
</label>
</section>

<section class="bg-white rounded-2xl shadow-sm p-6">
<div class="space-y-3 text-sm">
  <div class="flex justify-between">
    <span>Tạm tính</span>
    <span th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
  </div>

  <div class="flex justify-between">
    <span>Phí vận chuyển</span>
    <span th:text="${#numbers.formatDecimal(shippingFee, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
  </div>

  <div class="flex justify-between text-primary">
    <span>Giảm giá</span>
    <span th:text="'-' + ${#numbers.formatDecimal(discount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
  </div>

  <div class="flex justify-between font-extrabold text-xl pt-4 border-t">
    <span>Tổng thanh toán</span>
    <span class="text-primary"
      th:text="${#numbers.formatDecimal(finalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">
</span>
  </div>
</div>
</section>

</div>
</main>

<!-- ================= SUBMIT ================= -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg">
<div class="max-w-[1200px] mx-auto px-4 py-4">
<button type="submit"
class="w-full bg-primary text-white h-16 rounded-2xl text-xl font-black">
XÁC NHẬN ĐẶT HÀNG
</button>
</div>
</div>

</form>

<div th:replace="~{footer :: footer}"></div>
<style>
.input {
    width: 100%;
    height: 48px;
    padding: 0 16px;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    outline: none;
    transition: .2s;
}

.input:focus {
    border-color: #1a8a4d;
    box-shadow: 0 0 0 2px rgba(26, 138, 77, .15);
}

.error {
    color: #ef4444;
    font-size: 13px;
    margin-top: 4px;
}

.payment-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    cursor: pointer;
    margin-bottom: 12px;
    transition: .2s;
}

.payment-option:hover {
    background: #f9fafb;
}

.payment-option input {
    accent-color: #1a8a4d;
}
</style>

</body>
</html>
